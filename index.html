<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
    <div class="bg-white rounded-lg shadow p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6">TODOリスト</h1>

        <div class="flex gap-2 mb-6">
            <input id="todoInput" type="text" placeholder="タスクを入力..."
                class="flex-1 border border-gray-300 rounded px-3 py-2">
            <button id="addTodoBtn" 
                class="bg-blue-500 text-white font-bold px-4 py-2 rounded hover:bg-blue-700 transition">
                追加
            </button>
        </div>

        <ul id="todoList" class="space-y-2"></ul>
    </div>

<script>
    const addButton = document.querySelector('#addTodoBtn');
    const todoInput = document.querySelector('#todoInput');
    const todoList = document.querySelector('#todoList');

    addButton.addEventListener('click', () => {
        const text = todoInput.value;
        if (text === "") {return;}
            const item = document.createElement('li');
            item.className = "flex justify-between items-center bg-gray-50 rounded px-3 py-2";

            const span = document.createElement("span");
            span.textContent = text;

            const doneButton = document.createElement('button');
            doneButton.textContent = "完了";
            doneButton.className = "text-sm text-gray-500 hover:text-red-500 transition";

            doneButton.addEventListener("click", () => {
                span.classList.toggle("line-through");
                span.classList.toggle("text-gray-400");
            });

            item.appendChild(span);
            item.appendChild(doneButton);
            todoList.appendChild(item);

            todoInput.value = "";
            });
</script>
</body>
</html>
